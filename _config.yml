# SITE CONFIGURATION
title: Larry James Henry # your site title
author: Larry # You :P
description: Sharing the Journey.
baseurl: "/" # the subpath of your site, e.g. /blog
url: "https://larryjameshenry.com" # the base hostname & protocol for your site, e.g. http://example.com

# SEO PLUGIN
social:
  name: Larry James Henry
  links:
    - https://twitter.com/larryjameshenry
    - https://www.facebook.com/larryjameshenry
    - https://www.linkedin.com/in/larryjameshenry
    - https://github.com/larryjameshenry

# THEME SETTINGS
navigation: # Navigation links
  - {name: 'Home', link: '/'}
  - {name: 'About', link: '/about'}

tagline: Sharing the Journey

hero_img: posts/home_lg.jpg # Main background image: use the path from /assets/img/ => This will output /assets/img/posts/sleek_lg.jpg
hero_img_attrib: "https://www.freepik.com/creativeart Background photo created by creativeart - www.freepik.com"
email: blog@larryjameshenry.com # email for form submission

twitter_username: larryjameshenry # replace with your_twitter_username or comment to remove link from footer
github_username:  larryjameshenry # replace with your_github_username or comment to remove link from footer
instagram_username: larryjameshenry # replace with your_instagram_username or comment to remove link from footer

disqus:
  shortname: larryjameshenry # to enable comments replace with your_disqus_shortname

google_tag_manager: UA-128290315-2 # Uncomment to enable GTM. Replace GTM-XXXXXXX with your GTM container ID

# BUILD SETTINGS
markdown: kramdown
highlighter: rouge # or pygments or null
# theme: jekyll-sleek # Uncomment if you're using the theme as a ruby gem
exclude:
  - README.md

include: ['_pages']
permalink: /:title/

compress_html:
  clippings: all

plugins:
  - jekyll-sitemap
  - jekyll-seo-tag
