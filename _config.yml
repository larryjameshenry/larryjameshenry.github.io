# Site
name: "Larry James Henry"
title: "Sharing the Journey"
description: "I will take you on the fabulous world of exploration. Travel, culture, lifestyle. Eat, Pray, Love!"
logo: 'assets/images/logo.png'
favicon: 'assets/images/logo.png'
baseurl: /
google_analytics: 'UA-128290315-2'
disqus: 'larryjameshenry'
mailchimp-list: #'https://wowthemes.us11.list-manage.com/subscribe/post?u=8aeb20a530e124561927d3bd8&amp;id=8c3d2d214b'
include: ["_pages"]
permalink: /:title/
email: blog@larryjameshenry.com

# Authors
authors:
  larry:
    name: Larry
    display_name: Larry
    avatar: 'assets/images/avatar.jpg'
    gravatar: 
    email: larry@laryjameshenry.com
    web: https:/larryjameshenry.com
    twitter: https://twitter.com/larryjameshenry
    description: "Larry is a certified Azure Solutions Architect and skilled in Microsoft Azure, Dynamics 365 CRM, Azure DevOps, Cloud Integration, Visual Studio and Software Development."
  john:
    name: John
    display_name: John    
    avatar: 'assets/images/avatar.png'
    gravatar: 
    email: wowthemesnet@gmail.com
    web: https://www.wowthemes.net
    twitter: https://twitter.com/wowthemesnet
    description: "This is the author box. Write a short description of the author here. You are currently previewing Mediumish demo, a Jekyll template compatible with Github pages."

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-archives
  - jekyll-figure
    
# Archives
jekyll-archives:
  enabled:
    - categories
  layout: archive
  permalinks:
    category: '/category/:name/'
    
# Pagination 
paginate: 6
paginate_path: /page:num/
    
# Other
highlighter: rouge
markdown: kramdown
#kramdown:
#   syntax_highlighter_opts:
#      disable : true



# Adsense (change to "enabled" to activate, also your client id and ad slot. Create a new ad unit from your Adsense account to get the slot.)
adsense: "disabled"
adsense-data-ad-client: ""
adsense-data-ad-slot: ""

# Lazy Images ("enabled" or "disabled")
lazyimages: "disabled"

# Post Author Box ("enabled" or "disabled")
authorbox: "disabled"

# Sass
sass:
  sass_dir: _sass
  style: compressed

exclude: [changelog.md, LICENSE.txt, README.md, Gemfile, Gemfile.lock]
